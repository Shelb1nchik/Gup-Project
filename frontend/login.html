<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход | Girls und Panzer</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
    color: #eef4ff;
    font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}
.login-container {
    background: rgba(25, 30, 45, 0.7);
    backdrop-filter: blur(10px);
    border-radius: 32px;
    padding: 40px;
    width: 380px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
h1 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 1.8rem;
    background: linear-gradient(135deg, #fff, #e74c3c);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}
.input-group {
    margin-bottom: 20px;
}
.input-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
}
.password-wrapper {
    position: relative;
}
.password-wrapper input {
    width: 100%;
    padding-right: 40px;
}
.toggle-password {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #aaa;
    font-size: 18px;
}
input {
    width: 100%;
    padding: 12px 16px;
    background: #1e2438;
    border: 1px solid #2a3348;
    border-radius: 24px;
    color: white;
    font-size: 1rem;
    transition: 0.2s;
}
input:focus {
    outline: none;
    border-color: #e74c3c;
    box-shadow: 0 0 0 2px rgba(231,76,60,0.3);
}
button {
    width: 100%;
    background: linear-gradient(95deg, #e74c3c, #c0392b);
    border: none;
    padding: 12px;
    border-radius: 40px;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.2s;
    margin-top: 10px;
}
button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(231,76,60,0.4);
}
.register-link {
    text-align: center;
    margin-top: 20px;
    font-size: 0.9rem;
}
.register-link a {
    color: #e74c3c;
    text-decoration: none;
    font-weight: 500;
}
.register-link a:hover {
    text-decoration: underline;
}
.error {
    color: #e74c3c;
    text-align: center;
    margin-top: 12px;
    font-size: 0.85rem;
}
</style>
</head>
<body>
<div class="login-container">
    <h1>⚔️ Вход в систему</h1>
    <div class="input-group">
        <label>Логин</label>
        <input type="text" id="username" placeholder="Введите логин" autocomplete="off">
    </div>
    <div class="input-group">
        <label>Пароль</label>
        <div class="password-wrapper">
            <input type="password" id="password" placeholder="Введите пароль" autocomplete="new-password">
            <span class="toggle-password" onclick="togglePassword('password')">👁️</span>
        </div>
    </div>
    <button id="loginBtn">Войти</button>
    <div class="register-link">
        Нет аккаунта? <a href="register.html">Зарегистрируйтесь здесь</a>
    </div>
    <div id="errorMsg" class="error"></div>
</div>
<script>
const api = window.location.origin;

// Принудительная очистка полей при загрузке страницы
window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
});

function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    if (field.type === "password") {
        field.type = "text";
    } else {
        field.type = "password";
    }
}

document.getElementById("loginBtn").onclick = async () => {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    if (!username || !password) {
        document.getElementById("errorMsg").innerText = "Заполните все поля";
        return;
    }
    try {
        const res = await fetch(`${api}/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
            credentials: 'include'   // важно: отправка и получение кук
        });
        const data = await res.json();
        if (res.ok) {
            // Токен сохраняется в httpOnly куке сервером, клиенту не нужно его хранить
            window.location.href = "index.html";
        } else {
            document.getElementById("errorMsg").innerText = data.detail || "Ошибка входа";
        }
    } catch (err) {
        console.error(err);
        document.getElementById("errorMsg").innerText = "Ошибка соединения с сервером";
    }
};
</script>
</body>
</html>
